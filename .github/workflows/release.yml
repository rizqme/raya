name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Ubuntu x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: raya
            asset_name: raya-ubuntu-x86_64.tar.gz
            use_cross: false

          # Ubuntu ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: raya
            asset_name: raya-ubuntu-aarch64.tar.gz
            use_cross: true

          # macOS x86_64 (Intel)
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: raya
            asset_name: raya-macos-x86_64.tar.gz
            use_cross: false

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: raya
            asset_name: raya-macos-aarch64.tar.gz
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p raya-cli
          else
            cargo build --release --target ${{ matrix.target }} -p raya-cli
          fi

      - name: Create archive
        shell: bash
        run: |
          staging="raya-${{ matrix.target }}"
          mkdir -p "$staging"

          # Copy binary
          cp target/${{ matrix.target }}/release/raya "$staging/"

          # Create tar.gz
          tar czf ${{ matrix.asset_name }} -C "$staging" raya

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          for dir in */; do
            cd "$dir"
            sha256sum * > SHA256SUMS
            cd ..
          done
          cd ..
          find artifacts -name 'SHA256SUMS' -exec cat {} \; > checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*/*.tar.gz
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
